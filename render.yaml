services:
  # ---------------------------------------------------------
  # BACKEND - Node.js Express Server
  # ---------------------------------------------------------
  - type: web
    name: slicenspice-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: USE_REDIS
        value: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: slicenspice-redis
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: https://slicenspice.onrender.com,https://slicenspice.co.uk,https://www.slicenspice.co.uk
      - key: CLIENT_REDIRECT_URL
        value: https://slicenspice.co.uk/
      - key: CALLBACK_URL
        value: https://slicenspice-server.onrender.com/api/v1/auth/google/callback
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ROLES
        value: admin,user

  # ---------------------------------------------------------
  # REDIS - Background Caching
  # ---------------------------------------------------------
  - type: redis
    name: slicenspice-redis
    plan: free
    ipAllowList: [] # empty means only internal Render services can access this

  # ---------------------------------------------------------
  # FRONTEND - React + Vite Static Site
  # ---------------------------------------------------------
  - type: web
    name: slicenspice
    env: static
    rootDir: client
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    routes:
      # Required for React Router SPA (redirect all traffic to index.html)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://slicenspice-server.onrender.com
      - key: VITE_CONTACT_EMAIL
        sync: false
      - key: VITE_CONTACT_ADDRESS
        sync: false
